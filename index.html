<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Payal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            height: 100vh;
            background: linear-gradient(135deg, #87CEEB 0%, #FFB6C1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .card-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card-container:hover {
            transform: scale(1.02);
        }

        .birthday-title {
            font-size: 2.5rem;
            color: #4A90E2;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: titlePulse 2s ease-in-out infinite alternate;
        }

        .name {
            font-size: 3rem;
            color: #E91E63;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .message {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .cake-icon {
            margin: 20px 0;
            animation: cakeFloat 3s ease-in-out infinite;
        }

        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
        }

        .confetti.active {
            animation: confettiFall 3s ease-out forwards;
        }

        .balloon-container {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .balloon {
            animation: balloonFloat 4s ease-in-out infinite;
        }

        .click-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #888;
            animation: hintPulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes cakeFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-100px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(600px) rotate(720deg);
            }
        }

        @keyframes balloonFloat {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .sparkle {
            position: absolute;
            width: 20px;
            height: 20px;
            opacity: 0;
            animation: sparkle 1.5s ease-in-out;
        }

        @media (max-width: 480px) {
            .card-container {
                width: 90vw;
                height: 80vh;
                padding: 30px;
            }
            
            .birthday-title {
                font-size: 2rem;
            }
            
            .name {
                font-size: 2.5rem;
            }
            
            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card-container" onclick="celebrate()">
        <h1 class="birthday-title">Happy Birthday</h1>
        <h2 class="name">Payal</h2>
        
        <div class="cake-icon">
            <svg width="80" height="80" viewBox="0 0 100 100">
                <!-- Cake base -->
                <rect x="20" y="60" width="60" height="30" fill="#8B4513" rx="5"/>
                <rect x="25" y="50" width="50" height="20" fill="#DEB887" rx="3"/>
                <rect x="30" y="40" width="40" height="20" fill="#F4A460" rx="3"/>
                
                <!-- Candles -->
                <rect x="35" y="25" width="3" height="15" fill="#FFD700"/>
                <rect x="48" y="25" width="3" height="15" fill="#FFD700"/>
                <rect x="61" y="25" width="3" height="15" fill="#FFD700"/>
                
                <!-- Flames -->
                <ellipse cx="36.5" cy="22" rx="2" ry="4" fill="#FF6347"/>
                <ellipse cx="49.5" cy="22" rx="2" ry="4" fill="#FF6347"/>
                <ellipse cx="62.5" cy="22" rx="2" ry="4" fill="#FF6347"/>
                
                <!-- Decorations -->
                <circle cx="35" cy="55" r="3" fill="#FF69B4"/>
                <circle cx="50" cy="55" r="3" fill="#FF69B4"/>
                <circle cx="65" cy="55" r="3" fill="#FF69B4"/>
            </svg>
        </div>
        
        <p class="message">
            Wishing you a day filled with happiness<br>
            and a year filled with joy!<br>
            Hope all your birthday wishes come true! 🎉
        </p>
        
        <div class="balloon-container">
            <svg class="balloon" width="60" height="80" viewBox="0 0 60 80">
                <ellipse cx="15" cy="20" rx="12" ry="16" fill="#FF69B4"/>
                <ellipse cx="30" cy="25" rx="12" ry="16" fill="#87CEEB"/>
                <ellipse cx="45" cy="20" rx="12" ry="16" fill="#98FB98"/>
                
                <line x1="15" y1="36" x2="15" y2="70" stroke="#666" stroke-width="1"/>
                <line x1="30" y1="41" x2="30" y2="75" stroke="#666" stroke-width="1"/>
                <line x1="45" y1="36" x2="45" y2="70" stroke="#666" stroke-width="1"/>
            </svg>
        </div>
        
        <div class="confetti-container" id="confettiContainer"></div>
        
        <p class="click-hint">Click anywhere to celebrate! ✨</p>
    </div>

    <script>
        const colors = ['#FF69B4', '#87CEEB', '#98FB98', '#FFD700', '#FF6347', '#DDA0DD'];
        let celebrationCount = 0;

        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
                
                container.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.classList.add('active');
                }, 100);
                
                setTimeout(() => {
                    container.removeChild(confetti);
                }, 3500);
            }
        }

        function createSparkles(event) {
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.innerHTML = '✨';
                sparkle.style.left = (event.clientX - 10 + Math.random() * 20) + 'px';
                sparkle.style.top = (event.clientY - 10 + Math.random() * 20) + 'px';
                sparkle.style.fontSize = (Math.random() * 10 + 10) + 'px';
                sparkle.style.animationDelay = Math.random() * 0.5 + 's';
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    document.body.removeChild(sparkle);
                }, 1500);
            }
        }

        function celebrate(event) {
            celebrationCount++;
            
            // Create confetti
            createConfetti();
            
            // Create sparkles at click position
            if (event) {
                createSparkles(event);
            }
            
            // Add special effects for multiple clicks
            if (celebrationCount >= 3) {
                document.body.style.background = 'linear-gradient(135deg, #FF69B4 0%, #87CEEB 50%, #98FB98 100%)';
                setTimeout(() => {
                    document.body.style.background = 'linear-gradient(135deg, #87CEEB 0%, #FFB6C1 100%)';
                }, 2000);
            }
            
            // Play celebration sound effect (visual feedback)
            const card = document.querySelector('.card-container');
            card.style.transform = 'scale(1.05)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 200);
        }

        // Auto-celebration on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                createConfetti();
            }, 1000);
        });

        // Prevent default click behavior and add our celebration
        document.addEventListener('click', celebrate);
    </script>

</html>
